name: ci

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run mypy
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m mypy | tee artifacts/mypy.log

      - name: Upload mypy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: artifacts/mypy.log

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: |
          mkdir -p artifacts
          python -m ruff check proc2d tests --output-format=json > artifacts/ruff.json

      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: artifacts/ruff.json

  test:
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package (dev+gui)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,gui]"

      - name: Run full tests via make test
        run: |
          mkdir -p artifacts
          make test PYTEST_EXTRA_OPTS="--junitxml artifacts/pytest-${{ matrix.python-version }}.xml"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: artifacts/pytest-${{ matrix.python-version }}.xml
